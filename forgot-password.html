<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Task Management System</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- Scripts -->
    <script src="js/api.js" defer></script>
    <script src="js/auth.js" defer></script>
</head>
<body>
    <div class="auth-container">
        <div class="card">
            <div class="card-header">
                <h1 class="card-title">Reset Password</h1>
                <p class="card-subtitle">Enter your email to receive reset instructions</p>
            </div>
            
            <div id="forgot-alert" class="alert" style="display: none;"></div>

            <form id="forgot-password-form">
                <div class="form-group">
                    <label class="form-label" for="userOfficialEmail">Official Email</label>
                    <input type="email" id="userOfficialEmail" name="userOfficialEmail" class="form-control" placeholder="name@company.com" required>
                </div>

                <button type="submit" class="btn btn-primary mt-2">Send Reset Link</button>
            </form>

            <div class="text-center mt-4 text-sm">
                <p>Remember your password? <a href="login.html">Log in</a></p>
            </div>
        </div>
    </div>
</body>
</html>
