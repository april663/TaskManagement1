<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - Task Management System</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- Scripts -->
    <script src="js/api.js" defer></script>
    <script src="js/auth.js" defer></script>
</head>
<body>
    <div class="auth-container">
        <div class="card">
            <div class="card-header">
                <h1 class="card-title">Create an Account</h1>
                <p class="card-subtitle">Sign up to get started</p>
            </div>
            
            <div id="register-alert" class="alert" style="display: none;"></div>

            <form id="register-form">
                <div class="form-group">
                    <label class="form-label" for="username">Username</label>
                    <input type="text" id="username" name="username" class="form-control" placeholder="johndoe" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="userOfficialEmail">Official Email</label>
                    <input type="email" id="userOfficialEmail" name="userOfficialEmail" class="form-control" placeholder="name@company.com" required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="role">Role</label>
                    <select id="role" name="role" class="form-control" required>
                        <option value="" disabled selected>Select a role...</option>
                        <option value="ADMIN">Admin</option>
                        <option value="MANAGER">Manager</option>
                        <option value="DEVELOPER">Developer</option>
                        <option value="TESTER">Tester</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required minlength="6">
                </div>

                <button type="submit" class="btn btn-primary mt-2">Sign Up</button>
            </form>

            <div class="text-center mt-4 text-sm">
                <p>Already have an account? <a href="login.html">Log in</a></p>
            </div>
        </div>
    </div>
</body>
</html>
