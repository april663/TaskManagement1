<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Setup New Password - Task Management System</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- Scripts -->
    <script src="js/api.js" defer></script>
    <script src="js/auth.js" defer></script>
</head>
<body>
    <div class="auth-container">
        <div class="card">
            <div class="card-header">
                <h1 class="card-title">Create New Password</h1>
                <p class="card-subtitle">Please enter your new password below</p>
            </div>
            
            <div id="reset-alert" class="alert" style="display: none;"></div>

            <form id="reset-password-form">
                <div class="form-group">
                    <label class="form-label" for="password">New Password</label>
                    <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required minlength="6">
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" class="form-control" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn btn-primary mt-2">Update Password</button>
            </form>
            
            <!-- Simple client validation before submission if needed -->
            <script>
                document.getElementById('reset-password-form').addEventListener('submit', function(e) {
                    const pwd = document.getElementById('password').value;
                    const confirm = document.getElementById('confirmPassword').value;
                    if (pwd !== confirm) {
                        e.preventDefault();
                        const alertEl = document.getElementById('reset-alert');
                        alertEl.textContent = 'Passwords do not match.';
                        alertEl.className = 'alert alert-error';
                        alertEl.style.display = 'block';
                    }
                });
            </script>

            <div class="text-center mt-4 text-sm">
                <p>Back to <a href="login.html">Log in</a></p>
            </div>
        </div>
    </div>
</body>
</html>
